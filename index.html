<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Hell App">
<meta name="theme-color" content="#E24B4A">
<title>Hell App</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{
  --brand:#E24B4A;
  --brand-dark:#A32D2D;
  --brand-light:#FCEBEB;
  --green:#3B6D11;
  --green-bg:#EAF3DE;
  --blue:#185FA5;
  --blue-bg:#E6F1FB;
  --amber:#854F0B;
  --amber-bg:#FAEEDA;
  --gray:#5F5E5A;
  --gray-bg:#F1EFE8;
  --text:#1a1a1a;
  --text2:#5F5E5A;
  --border:#e0ddd6;
  --card:#fff;
  --bg:#F5F4F0;
}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;overflow-x:hidden}
.app{max-width:430px;margin:0 auto;min-height:100vh;padding-bottom:80px}

/* TOP BAR */
.topbar{background:var(--brand);padding:52px 1rem 1.25rem;color:#fff}
.topbar-row{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:1rem}
.greeting{font-size:13px;opacity:.8;margin-bottom:3px}
.username{font-size:22px;font-weight:600}
.streak-badge{background:rgba(255,255,255,.2);border-radius:12px;padding:8px 14px;text-align:center;min-width:60px}
.streak-num{font-size:22px;font-weight:700;line-height:1}
.streak-label{font-size:10px;opacity:.75;margin-top:2px}
.stats-row{display:grid;grid-template-columns:repeat(3,1fr);gap:8px}
.stat{background:rgba(255,255,255,.18);border-radius:10px;padding:8px 6px;text-align:center}
.stat-val{font-size:14px;font-weight:600}
.stat-lbl{font-size:10px;opacity:.7;margin-top:1px}

/* SECTIONS */
.section{padding:1rem}
.sec-title{font-size:11px;font-weight:600;color:var(--text2);text-transform:uppercase;letter-spacing:.07em;margin-bottom:.75rem}

/* TIME TOGGLE */
.toggle-row{display:flex;gap:8px;margin-bottom:1rem}
.time-btn{flex:1;padding:10px;border-radius:10px;border:1px solid var(--border);background:var(--card);font-size:14px;font-weight:500;color:var(--text2);cursor:pointer;display:flex;align-items:center;justify-content:center;gap:6px;transition:all .15s}
.time-btn.sel{background:var(--brand);border-color:var(--brand);color:#fff}

/* EXERCISE CARDS */
.ex-card{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:.875rem 1rem;margin-bottom:.5rem;display:flex;align-items:center;gap:12px;cursor:pointer;transition:opacity .2s}
.ex-card.done{opacity:.55}
.ex-check{width:26px;height:26px;border-radius:50%;border:2px solid var(--border);display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:all .2s;font-size:14px;color:transparent}
.ex-check.checked{background:var(--brand);border-color:var(--brand);color:#fff}
.ex-name{font-size:15px;font-weight:500}
.ex-sets{font-size:12px;color:var(--text2);margin-top:2px}
.ex-why{font-size:11px;color:var(--text2);margin-top:3px;font-style:italic}

/* TARGETS */
.targets-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:10px}
.target-card{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:.875rem}
.target-label{font-size:11px;color:var(--text2);margin-bottom:4px}
.target-val{font-size:18px;font-weight:600;color:var(--text)}
.target-unit{font-size:12px;color:var(--text2);font-weight:400}
.pbar{height:5px;background:var(--gray-bg);border-radius:4px;margin-top:8px;overflow:hidden}
.pbar-fill{height:100%;border-radius:4px;transition:width .4s}
.fill-red{background:var(--brand)}
.fill-blue{background:#378ADD}
.fill-amber{background:#EF9F27}
.fill-green{background:#639922}
.water-btns{display:flex;gap:6px;margin-top:8px}
.water-btn{flex:1;padding:6px;font-size:12px;border-radius:8px;border:1px solid var(--border);background:var(--bg);cursor:pointer;color:var(--text);font-weight:500}

/* QUOTE */
.quote-card{background:var(--brand-light);border:1px solid #F09595;border-radius:12px;padding:1rem}
.quote-text{font-size:13px;color:var(--brand-dark);line-height:1.65}
.quote-author{font-size:11px;color:var(--brand);margin-top:6px;font-weight:600}

/* WEEK PLAN */
.day-row{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:.875rem 1rem;margin-bottom:.5rem;display:flex;align-items:center;gap:12px}
.day-row.today{border-color:var(--brand);border-width:2px}
.day-icon{width:42px;height:42px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:20px;flex-shrink:0}
.day-name{font-size:15px;font-weight:500}
.day-type{font-size:12px;color:var(--text2);margin-top:2px}
.today-dot{width:8px;height:8px;border-radius:50%;background:var(--brand);margin-left:auto}

/* PROGRESS */
.cal-labels{display:grid;grid-template-columns:repeat(7,1fr);gap:3px;margin-bottom:4px}
.cal-lbl{font-size:10px;color:var(--text2);text-align:center}
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:3px}
.cal-cell{aspect-ratio:1;border-radius:6px;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:500}
.cal-empty{background:transparent}
.cal-blank{background:var(--gray-bg);color:var(--text2)}
.cal-today{background:var(--brand);color:#fff}
.cal-done{background:var(--green-bg);color:var(--green)}
.cal-miss{background:var(--brand-light);color:var(--brand-dark)}

.weight-form{display:flex;gap:8px;margin-bottom:1rem}
.weight-form input{flex:1;border:1px solid var(--border);border-radius:10px;padding:10px 14px;font-size:16px;background:var(--card);color:var(--text);outline:none}
.weight-form input:focus{border-color:var(--brand)}
.weight-form button{background:var(--brand);color:#fff;border:none;border-radius:10px;padding:10px 18px;font-size:14px;cursor:pointer;font-weight:600}
.w-row{display:flex;justify-content:space-between;align-items:center;padding:10px 0;border-bottom:1px solid var(--border)}
.w-date{font-size:13px;color:var(--text2)}
.w-val{font-size:15px;font-weight:600}
.w-delta{font-size:12px;font-weight:500}
.delta-up{color:var(--green)}
.delta-down{color:var(--brand)}

/* BOTTOM NAV */
.bottom-nav{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:430px;background:var(--card);border-top:1px solid var(--border);display:flex;padding:8px 0 20px;z-index:100}
.nav-btn{flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;background:none;border:none;cursor:pointer;color:var(--text2);font-size:10px;padding:4px 0;transition:color .15s}
.nav-btn.active{color:var(--brand)}
.nav-icon{font-size:24px;line-height:1}

/* VIEWS */
.view{display:none}
.view.active{display:block}
.page-header{padding:1.25rem 1rem .5rem;font-size:20px;font-weight:600}

.rest-card{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:1.25rem 1rem;text-align:center}
.rest-emoji{font-size:40px;margin-bottom:.5rem}
.rest-title{font-size:17px;font-weight:600;margin-bottom:4px}
.rest-sub{font-size:13px;color:var(--text2)}
</style>
</head>
<body>
<div class="app">

<!-- HOME VIEW -->
<div id="view-home" class="view active">
  <div class="topbar">
    <div class="topbar-row">
      <div>
        <div class="greeting" id="greeting">Good morning 🔥</div>
        <div class="username">Let's get it, bro</div>
      </div>
      <div class="streak-badge">
        <div class="streak-num" id="streak-num">0</div>
        <div class="streak-label">day streak</div>
      </div>
    </div>
    <div class="stats-row">
      <div class="stat">
        <div class="stat-val">0</div>
        <div class="stat-lbl">/ 2800 kcal</div>
      </div>
      <div class="stat">
        <div class="stat-val">0</div>
        <div class="stat-lbl">/ 105g protein</div>
      </div>
      <div class="stat">
        <div class="stat-val" id="hdr-water">0L</div>
        <div class="stat-lbl">/ 3.2L water</div>
      </div>
    </div>
  </div>

  <div class="section">
    <div class="sec-title">Today's session</div>
    <div class="toggle-row">
      <button class="time-btn sel" id="btn-morning" onclick="setTime('morning')">☀️ Morning</button>
      <button class="time-btn" id="btn-night" onclick="setTime('night')">🌙 Night</button>
    </div>
    <div id="today-workout"></div>
  </div>

  <div class="section">
    <div class="sec-title">Daily targets</div>
    <div class="targets-grid">
      <div class="target-card">
        <div class="target-label">🔥 Calories</div>
        <div class="target-val">0 <span class="target-unit">/ 2800</span></div>
        <div class="pbar"><div class="pbar-fill fill-red" style="width:0%"></div></div>
      </div>
      <div class="target-card">
        <div class="target-label">🥩 Protein</div>
        <div class="target-val">0 <span class="target-unit">/ 105g</span></div>
        <div class="pbar"><div class="pbar-fill fill-blue" style="width:0%"></div></div>
      </div>
      <div class="target-card">
        <div class="target-label">💧 Water</div>
        <div class="target-val" id="water-display">0 <span class="target-unit">/ 3.2L</span></div>
        <div class="pbar"><div class="pbar-fill fill-blue" id="water-bar" style="width:0%"></div></div>
        <div class="water-btns">
          <button class="water-btn" onclick="addWater()">+ 250ml</button>
          <button class="water-btn" style="flex:0;padding:6px 10px" onclick="resetWater()">↺</button>
        </div>
      </div>
      <div class="target-card">
        <div class="target-label">😴 Sleep</div>
        <div class="target-val">7.5 <span class="target-unit">hr goal</span></div>
        <div class="pbar"><div class="pbar-fill fill-amber" style="width:70%"></div></div>
      </div>
    </div>
  </div>

  <div class="section">
    <div class="sec-title">Today's quote</div>
    <div class="quote-card">
      <div class="quote-text" id="quote-text"></div>
      <div class="quote-author">— Hell App, day <span id="quote-day">1</span></div>
    </div>
  </div>
</div>

<!-- WORKOUT VIEW -->
<div id="view-workout" class="view">
  <div class="page-header">This week</div>
  <div class="section" style="padding-top:0">
    <div id="week-plan"></div>
  </div>
</div>

<!-- PROGRESS VIEW -->
<div id="view-progress" class="view">
  <div class="page-header">Progress</div>
  <div class="section" style="padding-top:0">
    <div class="sec-title">Calendar</div>
    <div class="cal-labels" id="cal-labels"></div>
    <div class="cal-grid" id="cal-grid"></div>
  </div>
  <div class="section">
    <div class="sec-title">Weight log (kg)</div>
    <div class="weight-form">
      <input type="number" id="weight-input" placeholder="e.g. 57.5" step="0.1" min="30" max="200">
      <button onclick="logWeight()">Log</button>
    </div>
    <div id="weight-history"></div>
  </div>
</div>

<!-- BOTTOM NAV -->
<nav class="bottom-nav">
  <button class="nav-btn active" id="nav-home" onclick="showView('home')">
    <span class="nav-icon">🏠</span>Home
  </button>
  <button class="nav-btn" id="nav-workout" onclick="showView('workout')">
    <span class="nav-icon">💪</span>Workout
  </button>
  <button class="nav-btn" id="nav-progress" onclick="showView('progress')">
    <span class="nav-icon">📈</span>Progress
  </button>
</nav>
</div>

<script>
const PPL = [
  {type:'push',label:'Push',emoji:'🔴',muscle:'Chest · Shoulders · Triceps',exercises:[
    {name:'Bench press',sets:'3 × 10 reps',why:'Builds chest thickness and overall upper body strength'},
    {name:'Overhead press',sets:'3 × 10 reps',why:'Shoulder width — makes you look broader'},
    {name:'Incline dumbbell press',sets:'3 × 12 reps',why:'Upper chest — the part that shows in a t-shirt'},
    {name:'Lateral raises',sets:'3 × 15 reps',why:'Side delts = the width that makes waist look smaller'},
    {name:'Tricep pushdown',sets:'3 × 12 reps',why:'Triceps = 2/3 of arm size'},
  ]},
  {type:'pull',label:'Pull',emoji:'🔵',muscle:'Back · Biceps · Rear delts',exercises:[
    {name:'Lat pulldown',sets:'3 × 10 reps',why:'Back width — creates the V-taper'},
    {name:'Seated cable row',sets:'3 × 10 reps',why:'Back thickness — makes back look 3D'},
    {name:'Face pulls',sets:'3 × 15 reps',why:'Rear delts and posture — prevents injury'},
    {name:'Barbell curl',sets:'3 × 12 reps',why:'Bicep peak — the muscle everyone notices'},
    {name:'Hammer curl',sets:'3 × 12 reps',why:'Forearm and brachialis — makes arms look bigger overall'},
  ]},
  {type:'legs',label:'Legs',emoji:'🟢',muscle:'Quads · Hamstrings · Glutes',exercises:[
    {name:'Squat',sets:'3 × 10 reps',why:'King of all exercises — builds everything'},
    {name:'Romanian deadlift',sets:'3 × 10 reps',why:'Hamstrings and glutes — posterior chain power'},
    {name:'Leg press',sets:'3 × 12 reps',why:'More quad volume without spine stress'},
    {name:'Leg curl',sets:'3 × 12 reps',why:'Isolated hamstring — prevents muscle imbalance'},
    {name:'Calf raise',sets:'4 × 15 reps',why:'Calf size — often neglected, always noticed'},
  ]},
];
const SCHEDULE = ['push','pull','legs','push','pull','legs','rest'];
const DAYS = ['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];
const SHORT_DAYS = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
const QUOTES = [
  "The pain you feel today is the strength you'll feel tomorrow. Channel that energy — you're not wasting it anymore.",
  "Every rep is a rep you're putting into yourself. Nobody can take that away.",
  "You chose the gym over the distraction. That's already winning.",
  "57kg today. Remember this number. You'll smile at it one day.",
  "Discipline is choosing who you want to be over who you feel like being right now.",
  "You don't need motivation. You need a habit. Show up. That's it.",
  "The person you're becoming is built one session at a time.",
];

let S = {
  timeOfDay:'morning',
  waterMl:0,
  streak:0,
  weightLog:[],
  exDone:{},
  lastOpened:null,
};

function load(){
  try{const d=localStorage.getItem('hellapp2');if(d)S={...S,...JSON.parse(d)};}catch(e){}
}
function save(){
  try{localStorage.setItem('hellapp2',JSON.stringify(S));}catch(e){}
}

load();

function greeting(){
  const h=new Date().getHours();
  if(h<12) return 'Good morning 🔥';
  if(h<17) return 'Good afternoon 💪';
  return 'Good evening 🌙';
}

function todayKey(){return new Date().toDateString();}

function getTodayType(){return SCHEDULE[new Date().getDay()];}

function setTime(t){
  S.timeOfDay=t;
  document.getElementById('btn-morning').classList.toggle('sel',t==='morning');
  document.getElementById('btn-night').classList.toggle('sel',t==='night');
  save();
}

function renderTodayWorkout(){
  const type=getTodayType();
  const el=document.getElementById('today-workout');
  if(type==='rest'){
    el.innerHTML=`<div class="rest-card"><div class="rest-emoji">😴</div><div class="rest-title">Rest day</div><div class="rest-sub">Recovery is where muscle actually grows.<br>Eat well, sleep 8 hours, hydrate.</div></div>`;
    return;
  }
  const ppl=PPL.find(p=>p.type===type);
  const key=todayKey();
  const doneCount=ppl.exercises.filter((_,i)=>S.exDone[key+'_'+type+'_'+i]).length;
  let html=`<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:.75rem">
    <span style="font-size:14px;font-weight:600">${ppl.emoji} ${ppl.label} — ${ppl.muscle}</span>
    <span style="font-size:12px;color:var(--text2)">${doneCount}/${ppl.exercises.length} done</span>
  </div>`;
  html+=ppl.exercises.map((ex,i)=>{
    const dk=key+'_'+type+'_'+i;
    const done=!!S.exDone[dk];
    return `<div class="ex-card ${done?'done':''}" onclick="toggleEx('${dk}')">
      <div class="ex-check ${done?'checked'}">${done?'✓':''}</div>
      <div><div class="ex-name">${ex.name}</div><div class="ex-sets">${ex.sets}</div><div class="ex-why">${ex.why}</div></div>
    </div>`;
  }).join('');
  el.innerHTML=html;
}

function toggleEx(key){
  S.exDone[key]=!S.exDone[key];
  save();
  renderTodayWorkout();
}

function addWater(){
  S.waterMl=Math.min(S.waterMl+250,3200);
  save();
  renderWater();
}
function resetWater(){S.waterMl=0;save();renderWater();}
function renderWater(){
  const L=(S.waterMl/1000).toFixed(1);
  document.getElementById('water-display').innerHTML=`${L} <span class="target-unit">/ 3.2L</span>`;
  document.getElementById('water-bar').style.width=Math.round((S.waterMl/3200)*100)+'%';
  document.getElementById('hdr-water').textContent=L+'L';
}

function renderWeekPlan(){
  const today=new Date().getDay();
  document.getElementById('week-plan').innerHTML=SCHEDULE.map((type,i)=>{
    const isToday=i===today;
    const ppl=PPL.find(p=>p.type===type);
    const emoji=type==='rest'?'⚪':ppl.emoji;
    const label=type==='rest'?'Rest & recovery':ppl.label+' day';
    const muscle=type==='rest'?'Sleep well, eat well':ppl.muscle;
    return `<div class="day-row ${isToday?'today':''}">
      <div class="day-icon" style="background:${type==='rest'?'#F1EFE8':type==='push'?'#FCEBEB':type==='pull'?'#E6F1FB':'#EAF3DE'};font-size:22px">${emoji}</div>
      <div><div class="day-name">${DAYS[i]}${isToday?' (today)':''}</div><div class="day-type">${label} · ${muscle}</div></div>
      ${isToday?'<div class="today-dot" style="margin-left:auto"></div>':''}
    </div>`;
  }).join('');
}

function renderCalendar(){
  const today=new Date();
  const y=today.getFullYear();const m=today.getMonth();
  const firstDay=new Date(y,m,1).getDay();
  const daysInMonth=new Date(y,m+1,0).getDate();
  document.getElementById('cal-labels').innerHTML=SHORT_DAYS.map(d=>`<div class="cal-lbl">${d}</div>`).join('');
  let html='';
  for(let i=0;i<firstDay;i++) html+=`<div class="cal-cell cal-empty"></div>`;
  for(let d=1;d<=daysInMonth;d++){
    const isToday=d===today.getDate();
    html+=`<div class="cal-cell ${isToday?'cal-today':'cal-blank'}">${d}</div>`;
  }
  document.getElementById('cal-grid').innerHTML=html;
}

function logWeight(){
  const inp=document.getElementById('weight-input');
  const v=parseFloat(inp.value);
  if(!v||v<30||v>200)return;
  S.weightLog.unshift({date:new Date().toLocaleDateString('en-GB',{day:'numeric',month:'short'}),kg:v});
  if(S.weightLog.length>30)S.weightLog.pop();
  inp.value='';save();renderWeightHistory();
}

function renderWeightHistory(){
  const el=document.getElementById('weight-history');
  if(!S.weightLog.length){
    el.innerHTML=`<div style="font-size:13px;color:var(--text2);padding:.5rem 0">No entries yet. Log your starting weight — you're at ~57kg.</div>`;
    return;
  }
  el.innerHTML=S.weightLog.map((e,i)=>{
    let delta='';
    if(i<S.weightLog.length-1){
      const diff=+(e.kg-S.weightLog[i+1].kg).toFixed(1);
      const sign=diff>0?'+':'';
      delta=`<span class="w-delta ${diff>=0?'delta-up':'delta-down'}">${sign}${diff}kg</span>`;
    }
    return `<div class="w-row"><span class="w-date">${e.date}</span><div style="display:flex;align-items:center;gap:8px"><span class="w-val">${e.kg}kg</span>${delta}</div></div>`;
  }).join('');
}

function showView(name){
  document.querySelectorAll('.view').forEach(v=>v.classList.remove('active'));
  document.getElementById('view-'+name).classList.add('active');
  document.querySelectorAll('.nav-btn').forEach(b=>b.classList.remove('active'));
  document.getElementById('nav-'+name).classList.add('active');
}

// INIT
document.getElementById('greeting').textContent=greeting();
document.getElementById('streak-num').textContent=S.streak;
const qIdx=new Date().getDate()%QUOTES.length;
document.getElementById('quote-text').textContent='"'+QUOTES[qIdx]+'"';
document.getElementById('quote-day').textContent=S.streak+1;
setTime(S.timeOfDay);
renderTodayWorkout();
renderWater();
renderWeekPlan();
renderCalendar();
renderWeightHistory();
</script>
</body>
</html>
<h1>Hello</h1>
